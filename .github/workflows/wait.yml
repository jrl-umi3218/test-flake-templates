name: "Wait 60s"

on:
  workflow_dispatch:
  push:
    branches:
      - devel
      - master
      - main
  pull_request:
    branches:
      - devel
      - master
      - main

jobs:
  wait:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for 60 seconds
        run: sleep 60

  check:
    if: always()
    name: check-wait
    runs-on: ubuntu-latest
    needs:
      - wait
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
